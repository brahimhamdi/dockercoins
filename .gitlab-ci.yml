stages:         
  - build
  - test
  - publish
  - deploy

build-worker:      
    stage: build
    image: docker:latest
    services:
    - name: docker:dind
      alias: docker
    script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - docker build -t registry.gitlab.com/brahimhamdi/dockercoins/worker worker/
build-rng:      
    stage: build
    image: docker:latest
    services:
    - name: docker:dind
      alias: docker
    script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - docker build -t registry.gitlab.com/brahimhamdi/dockercoins/rng rng/
build-hasher:      
    stage: build
    image: docker:latest
    services:
    - name: docker:dind
      alias: docker
    script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - docker build -t registry.gitlab.com/brahimhamdi/dockercoins/hasher hasher/
test-worker:      
    stage: test
    image: docker:latest
    services:
    - name: docker:dind
      alias: docker
    script:
    - docker run --rm --name worker registry.gitlab.com/brahimhamdi/dockercoins/worker
    - sleep 10
    - docker stop worker
test-rng:      
    stage: test
    image: docker:latest
    services:
    - name: docker:dind
      alias: docker
    script:
    - docker run --rm --name rng registry.gitlab.com/brahimhamdi/dockercoins/rng
    - sleep 10
    - docker stop rng
test-hasher:      
    stage: test
    image: docker:latest
    services:
    - name: docker:dind
      alias: docker
    script:
    - docker run --rm --name hasher registry.gitlab.com/brahimhamdi/dockercoins/hasher
    - sleep 10
    - docker stop hasher
push:
    stage: publish
    image: docker:latest
    services:
    - name: docker:dind
      alias: docker
    script:
    - docker push registry.gitlab.com/brahimhamdi/dockercoins/worker
    - docker push registry.gitlab.com/brahimhamdi/dockercoins/rng
    - docker push registry.gitlab.com/brahimhamdi/dockercoins/hasher